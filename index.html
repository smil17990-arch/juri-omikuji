<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎀 樹里ちゃんのおみくじ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=Shippori+Mincho:wght@800&family=Zen+Marugothic&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --brown:#a06844;--brown-dark:#7a4e2e;
  --text:#5a3828;--text-soft:#a08878;
}
html,body{width:100%;height:100%;font-family:'M PLUS Rounded 1c',sans-serif;overflow:hidden;}
body{background:linear-gradient(160deg,#fce8f2 0%,#f4eafc 40%,#e8f0fc 100%);}

.screen-fixed{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.45s ease;z-index:1;
  overflow-y:auto;
}
.screen-fixed.active{opacity:1;pointer-events:all;}

.screen-scroll{
  display:none;
  position:fixed;inset:0;
  flex-direction:column;
  align-items:center;
  background:linear-gradient(160deg,#fce8f2 0%,#f0e4fc 40%,#e4f0fc 100%);
  padding:0;
  gap:0;
  overflow:hidden;
}
.screen-scroll.active{display:flex;}
.result-inner{
  flex:1;
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:12px 16px 12px;
}
.btn-again-wrap{
  width:100%;
  padding:10px 16px 28px;
  background:rgba(252,232,242,0.98);
  display:none;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  border-top:1px solid rgba(240,180,210,0.3);
}
.btn-again-wrap.active{display:flex;}

/* ════ TITLE ════ */
#s-title{
  background:linear-gradient(160deg,#fce8f2 0%,#f4eafc 40%,#e8f0fc 100%);
  gap:14px;
  padding:clamp(14px,3.5vw,32px) 20px clamp(22px,5.5vw,40px);
  justify-content:flex-start;
}
#s-title::before{
  content:'';position:fixed;inset:10px;
  border:2px solid rgba(240,180,210,0.4);
  border-radius:30px;pointer-events:none;z-index:0;
}
.title-badge{
  display:inline-block;
  background:linear-gradient(135deg,#f0a0c8,#c0a0f0);
  color:white;font-size:10px;letter-spacing:4px;
  padding:5px 20px;border-radius:20px;
  font-family:'Zen Marugothic',sans-serif;
  box-shadow:0 2px 14px rgba(200,100,170,0.28);
  z-index:1;margin-top:clamp(8px,2.5vw,16px);
}
.title-h1{
  font-family:'Shippori Mincho',serif;
  font-size:clamp(26px,7.5vw,40px);font-weight:800;
  color:var(--brown-dark);letter-spacing:3px;line-height:1.2;
  text-shadow:0 2px 10px rgba(180,100,120,0.15);
  z-index:1;text-align:center;
}
.title-sub{font-size:12px;color:var(--text-soft);letter-spacing:2px;z-index:1;}

.hero-wrap{position:relative;width:min(230px,62vw);z-index:1;flex-shrink:0;}
.hero-aura{
  position:absolute;inset:-18px;
  background:radial-gradient(ellipse,rgba(245,180,210,0.4) 0%,rgba(200,215,245,0.2) 55%,transparent 75%);
  border-radius:50%;animation:aura 3.5s ease-in-out infinite;
}
@keyframes aura{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.12);opacity:1;}}
.hero-img{
  width:100%;border-radius:24px;display:block;
  box-shadow:0 8px 24px rgba(160,100,130,0.22),0 20px 60px rgba(160,100,130,0.15);
  animation:float 4.5s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-9px);}}

.greeting{
  width:min(330px,92vw);
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(10px);
  border:1.5px solid rgba(240,180,210,0.5);
  border-radius:24px;padding:14px 18px;text-align:center;z-index:1;
  box-shadow:0 4px 20px rgba(200,150,180,0.12),inset 0 1px 0 white;
}
.greeting-label{font-size:10px;letter-spacing:4px;color:#c080a8;font-family:'Zen Marugothic',sans-serif;margin-bottom:8px;display:block;}
.greeting-text{font-size:13px;color:var(--text);line-height:1.95;}
.greeting-text strong{color:var(--brown);font-weight:800;}

.btn-start{
  width:min(260px,80vw);z-index:1;
  background:linear-gradient(135deg,#f0a0c8 0%,#c8a0f0 100%);
  color:white;font-family:'M PLUS Rounded 1c',sans-serif;
  font-weight:800;font-size:17px;letter-spacing:3px;
  padding:16px 28px;border:none;border-radius:50px;cursor:pointer;
  box-shadow:0 5px 0 rgba(180,70,140,0.3),0 8px 24px rgba(200,100,170,0.3);
  position:relative;overflow:hidden;
  transition:transform 0.12s,box-shadow 0.12s;flex-shrink:0;
}
.btn-start::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.18);border-radius:50px 50px 0 0;}
.btn-start:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(180,70,140,0.3);}

/* ════ DRAW ════ */
#s-draw{
  background:linear-gradient(160deg,#fce8f2 0%,#f4eafc 40%,#e8f0fc 100%);
  gap:clamp(14px,3.2vw,26px);
  padding:clamp(24px,6vw,48px) 20px;
  justify-content:center;
}
.draw-title h2{font-family:'Shippori Mincho',serif;font-size:clamp(26px,7.5vw,36px);font-weight:800;color:var(--brown-dark);letter-spacing:2px;text-align:center;}
.draw-title p{font-size:13px;color:var(--text-soft);margin-top:6px;letter-spacing:1px;text-align:center;}

.cat-label{font-size:11px;letter-spacing:3px;color:var(--text-soft);font-family:'Zen Marugothic',sans-serif;text-align:center;margin-bottom:10px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:min(310px,88vw);}
.cat-btn{
  padding:12px 8px;border-radius:50px;
  border:2px solid rgba(240,180,210,0.5);
  background:rgba(255,255,255,0.72);
  color:var(--text-soft);font-family:'M PLUS Rounded 1c',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:all 0.2s;letter-spacing:1px;backdrop-filter:blur(4px);
}
.cat-btn.selected,.cat-btn:hover{
  background:linear-gradient(135deg,#f0a0c8,#c8a0f0);
  color:white;border-color:transparent;
  box-shadow:0 3px 14px rgba(200,100,170,0.35);transform:scale(1.04);
}

.box-wrap{position:relative;width:min(160px,46vw);flex-shrink:0;}
.omikuji-box{
  width:100%;aspect-ratio:1;
  background:linear-gradient(145deg,#f4a8cc 0%,#c890e8 50%,#a870d8 100%);
  border-radius:28px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:6px;
  cursor:pointer;
  box-shadow:0 8px 0 rgba(160,60,180,0.25),0 14px 40px rgba(180,80,200,0.28);
  position:relative;overflow:hidden;
  animation:boxWiggle 2.5s ease-in-out infinite;
  transition:transform 0.15s,box-shadow 0.15s;
}
@keyframes boxWiggle{0%,100%{transform:rotate(-1.5deg) translateY(0);}50%{transform:rotate(1.5deg) translateY(-4px);}}
.omikuji-box::before{content:'';position:absolute;top:8px;left:8px;right:8px;height:40%;background:rgba(255,255,255,0.2);border-radius:20px 20px 50% 50%;}
.box-emoji{font-size:36px;position:relative;z-index:1;line-height:1;}
.box-label{font-family:'M PLUS Rounded 1c',sans-serif;font-size:18px;font-weight:800;color:rgba(255,245,255,0.95);letter-spacing:3px;position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,0.15);}
.omikuji-box:active{transform:translateY(6px) rotate(0deg) !important;box-shadow:0 2px 0 rgba(160,60,180,0.25),0 4px 16px rgba(180,80,200,0.2) !important;animation:none;}

.draw-hint{font-size:13px;color:var(--text-soft);letter-spacing:1.5px;text-align:center;animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.35;}}

/* ════ RESULT ════ */
.result-card-img{
  width:auto;
  max-width:min(420px,97vw);
  max-height:calc(100vh - 140px);
  height:auto;
  border-radius:24px;
  display:block;
  object-fit:contain;
  box-shadow:0 8px 32px rgba(160,100,140,0.25),0 24px 64px rgba(160,100,140,0.18);
  animation:cardIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn{from{opacity:0;transform:scale(0.85) translateY(24px);}to{opacity:1;transform:scale(1) translateY(0);}}

.kinun-box{
  width:min(380px,92vw);
  background:rgba(30,10,50,0.82);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,200,80,0.4);
  border-radius:22px;padding:20px 24px;
  text-align:center;display:none;
}
.kinun-box.show{display:block;}
.kinun-icon{font-size:34px;margin-bottom:8px;display:block;}
.kinun-text{font-size:15px;color:white;line-height:2;}
.kinun-text strong{font-weight:800;color:#ffe080;}

.btn-again{
  width:min(270px,82vw);
  background:linear-gradient(135deg,#f0a0c8 0%,#c8a0f0 100%);
  color:white;font-family:'M PLUS Rounded 1c',sans-serif;
  font-weight:800;font-size:17px;letter-spacing:2px;
  padding:17px;border:none;border-radius:50px;cursor:pointer;
  box-shadow:0 5px 0 rgba(180,70,140,0.3),0 8px 24px rgba(200,100,170,0.3);
  position:relative;overflow:hidden;
  transition:transform 0.12s,box-shadow 0.12s;
}
.btn-again::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:rgba(255,255,255,0.18);border-radius:50px 50px 0 0;}
.btn-again:active{transform:translateY(3px) scale(0.97);box-shadow:0 2px 0 rgba(180,70,140,0.3);}

.flash-overlay{position:fixed;inset:0;background:white;opacity:0;pointer-events:none;z-index:500;transition:opacity 0.18s;}
.flash-overlay.on{opacity:1;}

.cp{position:fixed;pointer-events:none;z-index:999;animation:cpFall linear forwards;}
@keyframes cpFall{0%{transform:translateY(-20px) rotate(0deg) scale(1);opacity:1;}100%{transform:translateY(105vh) rotate(600deg) scale(0.3);opacity:0;}}
</style>
</head>
<body>

<div class="flash-overlay" id="flash"></div>

<!-- TITLE -->
<div id="s-title" class="screen-fixed active">
  <span class="title-badge">✦ FOR JURI ✦</span>
  <h1 class="title-h1">モカのおみくじ</h1>
  <p class="title-sub">🎀 今日の運勢をひいてみよう 🎀</p>
  <div class="hero-wrap">
    <div class="hero-aura"></div>
    <img class="hero-img" src="images/moka.png" alt="モカ">
  </div>
  <div class="greeting">
    <span class="greeting-label">✦ モカからのごあいさつ ✦</span>
    <p class="greeting-text">
      こんにちは、<strong>樹里ちゃん</strong>！<br>
      英語も折り紙も字もボーイスカウトも<br>
      みんなを笑顔にできる<br>
      <strong>最高の樹里ちゃん</strong>へ贈るよ🌸
    </p>
  </div>
  <button class="btn-start" onclick="goTo('s-draw')">おみくじをひく 🎀</button>
</div>

<!-- DRAW -->
<div id="s-draw" class="screen-fixed">
  <div class="draw-title">
    <h2>何のおみくじ？</h2>
    <p>えらんで、箱をタップしてね</p>
  </div>
  <div>
    <div class="cat-label">▸ おみくじのしゅるい</div>
    <div class="cat-grid">
      <button class="cat-btn selected" onclick="selectCat(this,'general')">⭐ 今日の運勢</button>
      <button class="cat-btn" onclick="selectCat(this,'study')">📚 お勉強</button>
      <button class="cat-btn" onclick="selectCat(this,'origami')">🦢 折り紙</button>
      <button class="cat-btn" onclick="selectCat(this,'kinun')">💰 金運</button>
    </div>
  </div>
  <div class="box-wrap">
    <div class="omikuji-box" id="omikuji-box" onclick="drawOmikuji()">
      <div class="box-emoji">🎀</div>
      <div class="box-label">おみくじ</div>
    </div>
  </div>
  <p class="draw-hint">↑ タップしておみくじをひこう！</p>
</div>

<!-- RESULT -->
<div id="s-result" class="screen-scroll">
  <div class="result-inner">
    <img class="result-card-img" id="result-img" src="" alt="おみくじ結果">
    <div class="kinun-box" id="kinun-box">
      <span class="kinun-icon">💰</span>
      <p class="kinun-text" id="kinun-text"></p>
    </div>
  </div>
  <div class="btn-again-wrap" id="btn-again-wrap">
    <button class="btn-again" onclick="goTo('s-draw')">🎀 もう一度ひく</button>
  </div>
</div>

<script>
// ══ 画像リスト ══
// 画像を増やすときはここに追加するだけ！
// ファイル名は images/ フォルダに入れたものと合わせてください
const IMAGES = [
  'images/img01.png',  // みんなから大吉
  'images/img02.png',  // 金運大吉
  'images/img03.png',  // ボーイスカウト吉
  'images/img04.png',  // 星空中吉
  'images/img05.png',  // 折り紙吉
  'images/img06.png',  // 虹小吉
  // ↓ 画像が増えたらここに追加
  // 'images/img07.png',
  // 'images/img08.png',
];

const KINUN_MSGS = [
  'パパに<strong>「今日の金運は大吉だよ！🤑」</strong>って<br>こっそり教えてみよう🤫<br>なにかいいことがあるかも…✨',
  '今日はパパに<strong>「〇〇がほしいな💕」</strong>って<br>やさしく伝えるチャンスだよ！<br>モカが応援してるよ🌟',
  'パパとママに<strong>「だいすき！」</strong>って<br>伝えると金運がグーンと上がるよ💛<br>やってみてね🤫✨',
];

let selectedCat = 'general';
let lastIdx = -1;

function goTo(id) {
  const flash = document.getElementById('flash');
  flash.classList.add('on');
  setTimeout(() => {
    document.querySelectorAll('.screen-fixed,.screen-scroll').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 's-result'){
      document.getElementById('btn-again-wrap').classList.add('active');
    } else {
      document.getElementById('btn-again-wrap').classList.remove('active');
    }
    window.scrollTo(0, 0);
    flash.classList.remove('on');
  }, 170);
}

function selectCat(btn, cat) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCat = cat;
}

function drawOmikuji() {
  const box = document.getElementById('omikuji-box');
  box.style.animation = 'none';
  box.style.transform = 'scale(0.86)';
  setTimeout(() => { box.style.transform = ''; box.style.animation = ''; }, 220);

  let idx;
  do { idx = Math.floor(Math.random() * IMAGES.length); }
  while (IMAGES.length > 1 && idx === lastIdx);
  lastIdx = idx;
  document.getElementById('result-img').src = IMAGES[idx];

  const kinunBox = document.getElementById('kinun-box');
  if (selectedCat === 'kinun') {
    kinunBox.classList.add('show');
    document.getElementById('kinun-text').innerHTML =
      KINUN_MSGS[Math.floor(Math.random() * KINUN_MSGS.length)];
  } else {
    kinunBox.classList.remove('show');
  }

  setTimeout(() => { goTo('s-result'); launchConfetti(); }, 280);
}

function launchConfetti() {
  const c = ['#f5b8d0','#c8b0f5','#b0d0f8','#f8d0a8','#b8e8c8','#f8c0d8','#d8c0f8','#ffe0a0'];
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cp';
      const s = 7 + Math.random() * 11;
      el.style.cssText = `left:${Math.random()*100}vw;top:-20px;width:${s}px;height:${s}px;background:${c[Math.floor(Math.random()*c.length)]};border-radius:${Math.random()>0.4?'50%':'3px'};animation-duration:${1.4+Math.random()*2}s;animation-delay:${i*28}ms;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }, i * 28);
  }
}
</script>
</body>
</html>
